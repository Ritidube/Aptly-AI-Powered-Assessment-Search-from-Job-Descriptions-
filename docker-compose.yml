services:
  postgres:
    image: postgres:16-alpine
    container_name: shl_recommender_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shl
      POSTGRES_PASSWORD: shl
      POSTGRES_DB: shl_recommender
    volumes:
      - shl_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shl -d shl_recommender"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: shl_recommender_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: shl_recommender_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - hf_cache:/tmp/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:7860"

volumes:
  shl_pg_data:
  hf_cache:
