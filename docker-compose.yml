version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: shl_recommender_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shl
      POSTGRES_PASSWORD: shl
      POSTGRES_DB: shl_recommender
    ports:
      - "5432:5432"
    volumes:
      - shl_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shl -d shl_recommender"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: shl_recommender_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # No volume: cached retrieval results are safe to lose on restart
    # (see app/cache.py) -- they're just a recomputable optimization,
    # not the source of truth for anything.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  shl_pg_data:

